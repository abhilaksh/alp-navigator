name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync files to VPS
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: >-
            -avz
            --delete
            --exclude='.git'
            --exclude='node_modules'
            --exclude='.next'
            --exclude='.env'
            --exclude='.env.production'
            --exclude='.env.local'
          path: ./
          remote_path: /opt/alp-navigator/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: root
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Build and deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 18m
          script: |
            set -e
            cd /opt/alp-navigator
            echo "→ Building Docker image..."
            docker build -t alp-navigator:latest .
            echo "→ Updating Swarm service..."
            docker service update --force --image alp-navigator:latest alp-navigator-app-yykw8x
            echo "✓ Deploy complete"
